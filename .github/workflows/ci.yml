# .github/workflows/ci.yml
name: CI — Test · Build · Scan · SBOM · Sign

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.22"

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Unit tests + coverage
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy and generate go.sum
        run: go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run unit tests with coverage
        run: |
          go test ./... \
            -v \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Verify coverage file exists
        run: ls -lah coverage.out

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Docker build + push to GHCR
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy and generate go.sum
        run: go mod tidy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Set single image ref output
        id: image-ref
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "value=${{ env.IMAGE_NAME }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Cosign image signing (keyless via OIDC)
# ─────────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign Image (Cosign)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

      - name: Verify Cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Vulnerability scan with Trivy
# ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Verify Trivy SARIF exists
        if: always()
        run: ls -lah trivy-results.sarif 2>/dev/null || echo "trivy-results.sarif not found"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — SBOM generation with Syft CLI
# ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    outputs:
      sbom-artifact-name: sbom-spdx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM (SPDX JSON) via Syft CLI
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            --output spdx-json=sbom.spdx.json \
            -v
          echo "--- SBOM size: $(wc -c < sbom.spdx.json) bytes ---"

      - name: Generate SBOM (CycloneDX JSON) via Syft CLI
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            --output cyclonedx-json=sbom.cyclonedx.json \
            -v
          echo "--- CycloneDX size: $(wc -c < sbom.cyclonedx.json) bytes ---"

      - name: Validate SBOM is non-empty valid JSON
        run: |
          if [ ! -s sbom.spdx.json ]; then
            echo "ERROR: sbom.spdx.json is empty or missing"
            exit 1
          fi
          python3 -c "
          import json, sys
          try:
              data = json.load(open('sbom.spdx.json'))
              pkgs = len(data.get('packages', []))
              print(f'SBOM valid — {pkgs} packages listed')
          except Exception as e:
              print(f'Invalid JSON: {e}')
              sys.exit(1)
          "

      - name: Verify SBOM files before upload
        run: |
          echo "=== SBOM files ==="
          ls -lah sbom.spdx.json sbom.cyclonedx.json

      - name: Upload SPDX SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload CycloneDX SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 30
          if-no-files-found: error

      - name: Attach SBOM attestation to image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action/publish-sbom@v0
        with:
          sbom-artifact-match: ".*\\.spdx\\.json$"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Vulnerability scan with Grype (from SBOM — no image pull needed)
# ─────────────────────────────────────────────────────────────────────────────
  grype:
    name: Vulnerability Scan (Grype via SBOM)
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-spdx
          path: sbom-dir

      - name: Debug — inspect downloaded artifact
        run: |
          echo "=== Directory tree ==="
          find sbom-dir -print | sed 's|[^/]*/|  |g'

          echo ""
          echo "=== File details ==="
          ls -lah sbom-dir/

          echo ""
          echo "=== File type ==="
          file sbom-dir/* 2>/dev/null || echo "file command failed"

          echo ""
          echo "=== First 300 bytes ==="
          head -c 300 sbom-dir/* 2>/dev/null || echo "could not read file"

          echo ""
          echo "=== Resolve SBOM path ==="
          SBOM_FILE=$(find sbom-dir -type f | head -1)
          echo "SBOM file: $SBOM_FILE"
          echo "SBOM_PATH=$SBOM_FILE" >> "$GITHUB_ENV"

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Run Grype against SBOM
        run: |
          set +e

          echo "Scanning SBOM at: $SBOM_PATH"
          grype "sbom:${SBOM_PATH}" \
            --output sarif=grype-results.sarif \
            --output table \
            --add-cpes-if-none \
            -v

          GRYPE_EXIT=$?
          echo "--- Grype exit code: $GRYPE_EXIT ---"
          echo "--- grype-results.sarif size: $(wc -c < grype-results.sarif 2>/dev/null || echo 'FILE MISSING') bytes ---"

          set -e
          if [ "$GRYPE_EXIT" -eq 1 ]; then
            echo "Grype encountered a hard error"
            exit 1
          fi

      - name: Validate Grype SARIF is non-empty valid JSON
        run: |
          if [ ! -s grype-results.sarif ]; then
            echo "ERROR: grype-results.sarif is empty or missing"
            exit 1
          fi
          python3 -c "
          import json, sys
          try:
              data = json.load(open('grype-results.sarif'))
              runs = len(data.get('runs', []))
              results = len(data['runs'][0].get('results', [])) if runs > 0 else 0
              print(f'SARIF valid — {runs} run(s), {results} finding(s)')
          except Exception as e:
              print(f'Invalid JSON: {e}')
              sys.exit(1)
          "

      - name: Upload Grype SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif
          category: grype

      - name: Upload Grype SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-sarif
          path: grype-results.sarif
          retention-days: 30
          if-no-files-found: warn
