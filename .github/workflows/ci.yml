# .github/workflows/ci.yml
name: CI — Test · Build · Scan · SBOM · Sign · Helm

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "docs/**"
      - ".gitignore"
      - ".gitattributes"

  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "docs/**"
      - ".gitignore"
      - ".gitattributes"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.26"
  HELM_CHART_PATH: no-latest-tag-webhook

# ─── Pipeline flow ────────────────────────────────────────────────────────────
#
#  test
#    └─► build
#           ├─► sign        (main only)
#           ├─► trivy
#           └─► sbom
#                 └─► grype
#                       └─► helm-update  ← tag injected LAST, after ALL scans pass
#                               └─► helm-package
#                                       └─► helm-publish-ghpages
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Unit tests + coverage
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy and generate go.sum
        run: go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run unit tests with coverage
        run: |
          go test ./... \
            -v \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Docker build + push to GHCR
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image-ref:    ${{ steps.image-ref.outputs.value }}
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag:    ${{ steps.image-tag.outputs.value }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy and generate go.sum
        run: go mod tidy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Set image tag output
        id: image-tag
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "value=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set image ref output
        id: image-ref
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "value=${{ env.IMAGE_NAME }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Cosign image signing (runs in parallel with trivy/sbom)
# ─────────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign Image (Cosign)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

      - name: Verify Cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Trivy vulnerability scan (runs in parallel with sbom/sign)
# ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — SBOM generation with Syft (runs in parallel with trivy/sign)
# ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    outputs:
      sbom-artifact-name: sbom-spdx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM — SPDX JSON
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            --output spdx-json=sbom.spdx.json -v
          echo "SBOM size: $(wc -c < sbom.spdx.json) bytes"

      - name: Generate SBOM — CycloneDX JSON
        run: |
          syft "${{ needs.build.outputs.image-ref }}" \
            --output cyclonedx-json=sbom.cyclonedx.json -v
          echo "CycloneDX size: $(wc -c < sbom.cyclonedx.json) bytes"

      - name: Validate SBOM is non-empty valid JSON
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('sbom.spdx.json'))
          pkgs = len(data.get('packages', []))
          print(f'SBOM valid — {pkgs} packages listed')
          "

      - name: Upload SPDX SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload CycloneDX SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 30
          if-no-files-found: error

      - name: Attach SBOM attestation to image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action/publish-sbom@v0
        with:
          sbom-artifact-match: ".*\\.spdx\\.json$"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Grype scan from SBOM
# ─────────────────────────────────────────────────────────────────────────────
  grype:
    name: Vulnerability Scan (Grype via SBOM)
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-spdx
          path: sbom-dir

      - name: Resolve SBOM path
        run: |
          SBOM_FILE=$(find sbom-dir -type f | head -1)
          echo "SBOM file: $SBOM_FILE"
          echo "SBOM_PATH=$SBOM_FILE" >> "$GITHUB_ENV"

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Run Grype against SBOM
        run: |
          set +e
          grype "sbom:${SBOM_PATH}" \
            --output sarif=grype-results.sarif \
            --output table \
            --add-cpes-if-none -v
          GRYPE_EXIT=$?
          set -e
          [ "$GRYPE_EXIT" -eq 1 ] && exit 1 || true

      - name: Validate Grype SARIF
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('grype-results.sarif'))
          runs = len(data.get('runs', []))
          results = len(data['runs'][0].get('results', [])) if runs > 0 else 0
          print(f'SARIF valid — {runs} run(s), {results} finding(s)')
          "

      - name: Upload Grype SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif
          category: grype

      - name: Upload Grype SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-sarif
          path: grype-results.sarif
          retention-days: 30
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# JOB 7 — Helm tag injection (LAST — only after grype + trivy + sign all pass)
# ─────────────────────────────────────────────────────────────────────────────
  helm-update:
    name: Update Helm Chart Image Tag
    runs-on: ubuntu-latest
    needs: [grype, trivy, sign]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image.tag in values.yaml
        run: |
          NEW_TAG="${{ needs.build.outputs.image-tag }}"
          VALUES_FILE="${{ env.HELM_CHART_PATH }}/values.yaml"

          echo "Injecting image.tag: ${NEW_TAG} into ${VALUES_FILE}"

          sed -i "s|^\(\s*tag:\s*\)\"sha-[a-f0-9]*\"|\1\"${NEW_TAG}\"|" "${VALUES_FILE}"

          echo "--- Updated image block ---"
          grep -A4 "^image:" "${VALUES_FILE}"

      - name: Bump Helm chart patch version
        run: |
          CHART_FILE="${{ env.HELM_CHART_PATH }}/Chart.yaml"
          CURRENT=$(grep '^version:' "${CHART_FILE}" | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version:.*/version: ${NEW_VERSION}/" "${CHART_FILE}"
          echo "Chart version bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Commit and push helm changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            "${{ env.HELM_CHART_PATH }}/values.yaml" \
            "${{ env.HELM_CHART_PATH }}/Chart.yaml"

          if git diff --cached --quiet; then
            echo "No helm changes to commit — skipping."
          else
            git commit -m "chore(helm): update image.tag to ${{ needs.build.outputs.image-tag }} [skip ci]"
            git push
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 8 — Package Helm chart and upload as artifact
# ─────────────────────────────────────────────────────────────────────────────
  helm-package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: helm-update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    outputs:
      chart-pkg: ${{ steps.package.outputs.chart-pkg }}

    steps:
      # FIX 1: fetch-depth: 0 ensures the helm-update commit is included.
      # Without this, a shallow clone may check out the commit BEFORE
      # helm-update pushed the bumped Chart.yaml / values.yaml.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0            # ← was 1; 0 = full history, gets helm-update commit

      # FIX 2: Explicit pull guarantees we are on the very latest commit on main,
      # not just whatever SHA actions/checkout resolved at job-queue time.
      - name: Pull latest main
        run: git pull origin main

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      # ── Step 1: confirm chart directory exists ──────────────────────────────
      - name: Verify chart directory exists
        run: |
          set -e
          echo "HELM_CHART_PATH = ${{ env.HELM_CHART_PATH }}"
          echo ""
          echo "=== Repo root ==="
          ls -la
          echo ""
          echo "=== Chart dir ==="
          ls -la ${{ env.HELM_CHART_PATH }}/
          echo ""
          echo "=== Chart.yaml ==="
          cat ${{ env.HELM_CHART_PATH }}/Chart.yaml
          echo ""
          echo "=== templates/ ==="
          ls -la ${{ env.HELM_CHART_PATH }}/templates/

      # ── Step 2: lint before packaging ──────────────────────────────────────
      - name: Lint Helm chart
        run: |
          set -e
          helm lint ${{ env.HELM_CHART_PATH }} --strict
          echo "Lint passed"

      # ── Step 3: package ────────────────────────────────────────────────────
      - name: Package Helm chart
        id: package
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/.chart-output"

          echo "=== Packaging chart ==="
          helm package ${{ env.HELM_CHART_PATH }} \
            --destination "$GITHUB_WORKSPACE/.chart-output" \
            --debug

          echo ""
          echo "=== .chart-output after packaging ==="
          ls -lah "$GITHUB_WORKSPACE/.chart-output/"

          TGZ=$(ls "$GITHUB_WORKSPACE/.chart-output/"*.tgz 2>/dev/null | head -1)
          if [ -z "${TGZ}" ]; then
            echo "ERROR: no .tgz found — helm package failed"
            exit 1
          fi

          CHART_PKG=$(basename "${TGZ}")
          echo "chart-pkg=${CHART_PKG}" >> "$GITHUB_OUTPUT"
          echo "Successfully packaged: ${CHART_PKG}"

      # ── Step 4: upload artifact ─────────────────────────────────────────────
      # FIX 3: Use ${{ github.workspace }} (absolute path) instead of the
      # relative .chart-output/*.tgz — eliminates any working-directory
      # ambiguity between the run step and the upload-artifact action.
      - name: Upload chart package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-package
          path: ${{ github.workspace }}/.chart-output/*.tgz   # ← absolute path
          retention-days: 1
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# JOB 9 — Publish packaged chart to gh-pages
# ─────────────────────────────────────────────────────────────────────────────
  helm-publish-ghpages:
    name: Publish Helm Chart to GitHub Pages
    runs-on: ubuntu-latest
    needs: helm-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download chart package artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart-package
          path: /tmp/chart-output

      - name: Verify .tgz downloaded correctly
        run: |
          echo "--- Downloaded artifact ---"
          ls -lah /tmp/chart-output/
          if [ -z "$(ls /tmp/chart-output/*.tgz 2>/dev/null)" ]; then
            echo "ERROR: no .tgz found in artifact"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Checkout or create gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          path: gh-pages-dir
        continue-on-error: true

      - name: Create gh-pages branch if it does not exist
        run: |
          if [ ! -d "gh-pages-dir/.git" ]; then
            echo "gh-pages branch not found — creating it"
            git clone \
              --branch main \
              --depth 1 \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
              gh-pages-dir

            cd gh-pages-dir
            git checkout --orphan gh-pages
            git rm -rf .
            echo "# Helm Chart Repository" > README.md
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: initialise gh-pages branch"
            git push origin gh-pages
          else
            echo "gh-pages branch exists"
          fi

      - name: Copy .tgz into gh-pages dir
        run: |
          cp /tmp/chart-output/*.tgz gh-pages-dir/
          echo "--- gh-pages-dir contents ---"
          ls -lah gh-pages-dir/

      - name: Update Helm repo index
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)"
          echo "Repo URL: ${PAGES_URL}"

          cd gh-pages-dir

          if [ -f index.yaml ]; then
            echo "Merging into existing index.yaml"
            helm repo index . --url "${PAGES_URL}" --merge index.yaml
          else
            echo "Creating new index.yaml"
            helm repo index . --url "${PAGES_URL}"
          fi

          echo "--- index.yaml ---"
          cat index.yaml

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-dir

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add *.tgz index.yaml

          if git diff --cached --quiet; then
            echo "No changes to publish — skipping."
          else
            git commit -m "chore(helm-publish): release ${{ needs.helm-package.outputs.chart-pkg }}"
            git push origin gh-pages
            echo "✅ Published ${{ needs.helm-package.outputs.chart-pkg }} to gh-pages"
          fi

      - name: Print install instructions
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)"
          echo ""
          echo "════════════════════════════════════════════════"
          echo "  Helm chart published to GitHub Pages!"
          echo "  Chart: ${{ needs.helm-package.outputs.chart-pkg }}"
          echo "════════════════════════════════════════════════"
          echo "  Add repo:"
          echo "    helm repo add no-latest-tag ${PAGES_URL}"
          echo "    helm repo update"
          echo ""
          echo "  Install:"
          echo "    helm install no-latest-tag no-latest-tag/no-latest-tag-webhook \\"
          echo "      -n webhook-system --create-namespace"
          echo ""
          echo "  Verify:"
          echo "    helm search repo no-latest-tag"
          echo "    curl ${PAGES_URL}/index.yaml"
          echo "════════════════════════════════════════════════"
