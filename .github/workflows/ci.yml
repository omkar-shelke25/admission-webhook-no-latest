# .github/workflows/ci.yml
name: CI — Test · Build · Scan · SBOM · Sign

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.22"

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Unit tests + coverage
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy and generate go.sum
        run: go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run unit tests with coverage
        run: |
          go test ./... \
            -v \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Docker build + push to GHCR
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy and generate go.sum
        run: go mod tidy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Set single image ref output
        id: image-ref
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "value=${{ env.IMAGE_NAME }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Cosign image signing (keyless via OIDC)
# ─────────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign Image (Cosign)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

      - name: Verify Cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Vulnerability scan with Trivy
# ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Vulnerability scan with Grype
# ─────────────────────────────────────────────────────────────────────────────
  grype:
    name: Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Pull image locally
        run: |
          docker pull ${{ needs.build.outputs.image-ref }}
          docker images

      - name: Run Grype scan
        run: |
          set +e  # do not exit on non-zero so we capture all output

          grype "${{ needs.build.outputs.image-ref }}" \
            --output sarif \
            --file grype-results.sarif \
            --add-cpes-if-none \
            -v
          GRYPE_EXIT=$?

          echo "--- Grype exit code: $GRYPE_EXIT ---"
          echo "--- grype-results.sarif size: $(wc -c < grype-results.sarif 2>/dev/null || echo 'FILE MISSING') bytes ---"
          echo "--- grype-results.sarif head ---"
          head -c 500 grype-results.sarif 2>/dev/null || echo "FILE MISSING OR EMPTY"

          set -e
          # Exit non-zero only on actual errors (exit 1), not on findings (exit 0 or 2)
          if [ "$GRYPE_EXIT" -eq 1 ]; then
            echo "Grype failed with a hard error"
            exit 1
          fi

      - name: Validate SARIF is non-empty valid JSON
        run: |
          if [ ! -s grype-results.sarif ]; then
            echo "ERROR: grype-results.sarif is empty or missing"
            ls -lah grype-results.sarif 2>/dev/null || echo "file does not exist"
            exit 1
          fi
          python3 -c "
          import json, sys
          try:
              data = json.load(open('grype-results.sarif'))
              print('SARIF is valid JSON')
              print(f'runs count: {len(data.get(\"runs\", []))}')
          except Exception as e:
              print(f'Invalid JSON: {e}')
              sys.exit(1)
          "

      - name: Upload Grype SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif
          category: grype

      - name: Upload Grype SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-sarif
          path: grype-results.sarif
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — SBOM generation with Syft
# ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image-ref }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          artifact-name: sbom-spdx

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image-ref }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-cyclonedx

      - name: Attach SBOM attestation to image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action/publish-sbom@v0
        with:
          sbom-artifact-match: ".*\\.spdx\\.json$"
