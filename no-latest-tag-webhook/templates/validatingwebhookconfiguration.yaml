apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "no-latest-tag-webhook.fullname" . }}
  labels:
    {{- include "no-latest-tag-webhook.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    # cert-manager watches this annotation and automatically injects the
    # caBundle from the Certificate into this webhook — no manual base64 needed.
    # Format: <namespace>/<certificate-name>
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "no-latest-tag-webhook.tlsSecretName" . }}
  {{- end }}
webhooks:
  - name: no-latest-tag.{{ .Release.Namespace }}.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.admissionWebhook.failurePolicy }}
    timeoutSeconds: {{ .Values.admissionWebhook.timeoutSeconds }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.namespaceSelector.excludedNamespaces }}
            - {{ . }}
            {{- end }}
    rules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["pods"]
        scope:       "Namespaced"
    clientConfig:
      # cert-manager injects caBundle automatically via the annotation above.
      # If certManager.enabled=false, set this manually to your base64 CA cert.
      caBundle: ""
      service:
        name:      {{ include "no-latest-tag-webhook.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path:      /validate
        port:      {{ .Values.service.port }}