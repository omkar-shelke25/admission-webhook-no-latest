{{- if .Values.certManager.enabled }}
# ClusterIssuer is CLUSTER-SCOPED — required for webhook TLS.
# A namespace-scoped Issuer cannot be referenced by ValidatingWebhookConfiguration
# because that resource is also cluster-scoped and has no namespace context.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "no-latest-tag-webhook.clusterIssuerName" . }}
  labels:
    {{- include "no-latest-tag-webhook.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}