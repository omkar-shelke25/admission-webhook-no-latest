apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "no-latest-tag-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "no-latest-tag-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "no-latest-tag-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "no-latest-tag-webhook.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod restart when TLS secret changes
        checksum/tls: {{ include "no-latest-tag-webhook.tlsSecretName" . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: webhook
          image: {{ include "no-latest-tag-webhook.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: WEBHOOK_ADDR
              value: ":{{ .Values.webhook.port }}"
            - name: WEBHOOK_CERT
              value: {{ .Values.webhook.certPath }}
            - name: WEBHOOK_KEY
              value: {{ .Values.webhook.keyPath }}
          ports:
            - name: https
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tls
              mountPath: /etc/webhook/certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.webhook.port }}
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.webhook.port }}
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "no-latest-tag-webhook.tlsSecretName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}